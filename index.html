<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Master Pro Cloud v16</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }

        #status-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; 
        }
        
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { background: transparent; color: var(--text-dim); padding: 12px 24px; border: none; cursor: pointer; font-weight: 600; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: #0f172a; }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: var(--card-bg); padding: 18px; border-radius: 12px; border: 1px solid var(--border); }
        .kpi-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .kpi-value { font-size: 1.3rem; font-weight: 700; margin-top: 6px; display: block; }
        
        .panel { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        .panel-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 15px; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 10px; }

        input { background: #0f172a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        label { font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 5px; }
        
        button { border-radius: 6px; padding: 10px 15px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #0f172a; width: 100%; }
        .btn-secondary { background: var(--secondary); color: white; width: 100%; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; color: var(--text-dim); border-bottom: 1px solid var(--border); font-size: 0.75rem; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-warning { color: var(--warning); }
    </style>
</head>
<body>

<div class="container">
    <!-- Status/Loading Screen -->
    <div id="status-screen">
        <div class="loader" id="loader-icon"></div>
        <h2 id="status-text">Connecting to Cloud...</h2>
        <p id="error-log" style="color: var(--danger); margin-top: 10px; display: none;"></p>
    </div>

    <!-- Main Dashboard -->
    <div id="main-dashboard" style="display: none;">
        <header style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin:0; font-size: 1.4rem;">Trader Master Pro v16</h1>
            <span id="user-email" style="font-size: 0.8rem; color: var(--text-dim);"></span>
        </header>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('portfolio')">Portfolio</button>
            <button class="tab-btn" onclick="switchTab('capital')">Investments</button>
        </div>

        <!-- PORTFOLIO TAB -->
        <div id="tab-portfolio" class="tab-content active">
            <div class="kpi-grid">
                <div class="kpi-card"><span class="kpi-label">Account Equity</span><span class="kpi-value" id="pEquity">$0</span></div>
                <div class="kpi-card"><span class="kpi-label">Current HWM</span><span class="kpi-value" id="pHWM" style="color:var(--primary);">$0</span></div>
                <div class="kpi-card"><span class="kpi-label">Unpaid Split (20%)</span><span class="kpi-value text-warning" id="pUnpaid">$0</span></div>
                <div class="kpi-card"><span class="kpi-label">User Net (80%)</span><span class="kpi-value text-success" id="pUserNet">$0</span></div>
            </div>

            <div class="panel">
                <div class="panel-title">Add Equity Entry</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: flex-end;">
                    <div><label>Date</label><input type="date" id="eDate"></div>
                    <div><label>Equity ($)</label><input type="number" id="eValue"></div>
                    <button class="btn-primary" onclick="addEntry()">Record</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Historical Log</div>
                <table id="historyTable">
                    <thead><tr><th>Date</th><th>Equity</th><th>HWM</th><th>P&L</th><th>Split</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- CAPITAL TAB -->
        <div id="tab-capital" class="tab-content">
            <div class="panel">
                <div class="panel-title">Add Capital Injection</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: flex-end;">
                    <div><label>Date</label><input type="date" id="iDate"></div>
                    <div><label>Amount ($)</label><input type="number" id="iValue"></div>
                    <button class="btn-secondary" onclick="addInvest()">Add Capital</button>
                </div>
            </div>
            <div class="panel">
                <table id="investTable">
                    <thead><tr><th>Date</th><th>Amount</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. CONFIGURATION
    const SUPABASE_URL = 'https://iofrhbwixhoerudbgsgu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_j9gURS6MOo-FLuN3MMN2nA_p0DkC5B_';
    
    // Create Client
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = { entries: [], investments: [], pays: [] };

    // 2. INITIALIZATION & AUTH
    async function init() {
        try {
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: 'Kefayat.399578@gmail.com',
                password: 'KefayatJAAAAAn'
            });

            if (error) throw error;

            document.getElementById('user-email').innerText = 'Logged in: ' + data.user.email;
            
            // Initial data pull
            await pullData();

            // Show Dashboard
            document.getElementById('status-screen').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';

        } catch (err) {
            console.error('Init Error:', err);
            document.getElementById('loader-icon').style.display = 'none';
            document.getElementById('status-text').innerText = 'Connection Error';
            document.getElementById('error-log').innerText = err.message;
            document.getElementById('error-log').style.display = 'block';
        }
    }

    async function pullData() {
        const { data, error } = await _supabase
            .from('trading_data')
            .select('payload')
            .eq('id', 'user_data')
            .single();

        if (data) {
            db = data.payload;
            render();
        }
    }

    async function save() {
        const { error } = await _supabase
            .from('trading_data')
            .upsert({ id: 'user_data', payload: db });
        
        if (error) alert("Save failed: " + error.message);
        render();
    }

    // 3. CORE LOGIC (Fixed v15 Logic)
    function render() {
        const hTab = document.querySelector('#historyTable tbody');
        const iTab = document.querySelector('#investTable tbody');
        hTab.innerHTML = ''; iTab.innerHTML = '';
        
        let totalEarned = 0;
        let runningHWM = 0;
        
        db.investments.sort((a,b) => new Date(a.date) - new Date(b.date));
        db.entries.sort((a,b) => new Date(a.date) - new Date(b.date));

        // Render Investment Table
        db.investments.forEach((inv, idx) => {
            iTab.innerHTML += `<tr><td>${inv.date}</td><td>$${inv.val.toLocaleString()}</td><td><button onclick="delInvest(${idx})" style="background:var(--danger); color:white; padding:4px 8px; font-size:0.7rem;">Del</button></td></tr>`;
        });

        // Calculate History
        db.entries.forEach(e => {
            let cumulativeInvest = db.investments
                .filter(inv => new Date(inv.date) <= new Date(e.date))
                .reduce((sum, inv) => sum + inv.val, 0);

            // Force HWM up to match Investment Floor
            if (runningHWM < cumulativeInvest) runningHWM = cumulativeInvest;

            const growth = e.val - runningHWM;
            let myCut = growth > 0 ? growth * 0.20 : 0;
            
            hTab.innerHTML += `<tr>
                <td>${e.date}</td>
                <td>$${e.val.toLocaleString()}</td>
                <td>$${runningHWM.toLocaleString()}</td>
                <td class="${growth >=0 ? 'text-success' : 'text-danger'}">$${growth.toLocaleString()}</td>
                <td>$${myCut.toLocaleString()}</td>
            </tr>`;
            
            if (e.val > runningHWM) runningHWM = e.val;
            totalEarned += myCut;
        });

        // KPIs
        let totalInv = db.investments.reduce((s,i) => s+i.val, 0);
        let latestEquity = db.entries.length > 0 ? db.entries[db.entries.length-1].val : totalInv;
        
        document.getElementById('pEquity').innerText = '$' + latestEquity.toLocaleString();
        document.getElementById('pHWM').innerText = '$' + runningHWM.toLocaleString();
        document.getElementById('pUnpaid').innerText = '$' + totalEarned.toLocaleString();
        document.getElementById('pUserNet').innerText = '$' + ((runningHWM - totalInv) * 0.8).toLocaleString();
    }

    function addEntry() {
        const d = document.getElementById('eDate').value, v = parseFloat(document.getElementById('eValue').value);
        if (!d || isNaN(v)) return;
        db.entries.push({ date: d, val: v });
        save();
    }

    function addInvest() {
        const d = document.getElementById('iDate').value, v = parseFloat(document.getElementById('iValue').value);
        if (!d || isNaN(v)) return;
        db.investments.push({ date: d, val: v });
        if (db.entries.length > 0) db.entries[db.entries.length-1].val += v;
        save();
    }

    function delInvest(idx) { if(confirm("Delete?")) { db.investments.splice(idx,1); save(); } }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Set Defaults
    document.getElementById('eDate').valueAsDate = new Date();
    document.getElementById('iDate').valueAsDate = new Date();

    // Start App
    window.onload = init;
</script>
</body>
</html>
